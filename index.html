<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crystal</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "phaser": "https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js",
        "pako": "https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.esm.mjs"
        }
    }
    </script>
  <script type="module" crossorigin src="/src/main.js"></script>
  <script>
    // ResizeObserver catches iframe size changes that window.resize misses
    // (e.g. parent window maximize, snap, title bar drag)
    new ResizeObserver(() => {
      window.dispatchEvent(new Event('resize'));
    }).observe(document.documentElement);
  </script>
</head>
